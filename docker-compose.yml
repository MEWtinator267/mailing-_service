version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: mailing-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - mailing-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mailing-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - '3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      # PostgreSQL Connection
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis on EC2 #1 (EventRelay instance)
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # SMTP Configuration
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
      FROM_NAME: ${FROM_NAME}
      # Application Configuration
      APP_NAME: ${APP_NAME:-EventRelay}
      APP_DASHBOARD_URL: ${APP_DASHBOARD_URL}
      APP_LOGO_URL: ${APP_LOGO_URL:-}
      OFFERS_DATA_SOURCE: ${OFFERS_DATA_SOURCE:-database}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    networks:
      - mailing-net

  nginx:
    image: nginx:alpine
    container_name: mailing-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl/letsencrypt:/etc/letsencrypt:ro
      - ./ssl/certbot:/var/www/certbot:ro
    networks:
      - mailing-net

networks:
  mailing-net:
    driver: bridge
    enable_ipv6: false

