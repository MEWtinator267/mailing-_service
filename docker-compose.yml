version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: mailing-redis
    restart: unless-stopped
    networks:
      - mailing-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mailing-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - '3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
      FROM_NAME: ${FROM_NAME}
      APP_NAME: ${APP_NAME}
      APP_DASHBOARD_URL: ${APP_DASHBOARD_URL}
      APP_LOGO_URL: ${APP_LOGO_URL:-}
      OFFERS_DATA_SOURCE: ${OFFERS_DATA_SOURCE}
      LOG_LEVEL: ${LOG_LEVEL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    networks:
      - mailing-net

  nginx:
    image: nginx:alpine
    container_name: mailing-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - mailing-net

networks:
  mailing-net:
    driver: bridge

